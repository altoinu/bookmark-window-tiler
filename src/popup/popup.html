<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Launch Workspace</title>
    <style>
      body {
        background-color: #f9f9f9;
        color: #333;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
        margin: 0;
        padding: 15px;
        width: 250px;
      }
      h2 {
        border-bottom: 1px solid #ccc;
        font-size: 16px;
        margin: 0 0 15px 0;
        padding-bottom: 8px;
      }
      .empty-state {
        color: #666;
        font-size: 13px;
        text-align: center;
      }
      .profile-btn {
        background-color: #0078d7;
        border-radius: 4px;
        border: none;
        color: white;
        cursor: pointer;
        display: block;
        font-size: 14px;
        margin-bottom: 10px;
        padding: 10px;
        text-align: left;
        transition: background-color 0.2s;
        width: 100%;
      }
      .profile-btn:hover {
        background-color: #005a9e;
      }
    </style>
  </head>
  <body>
    <h2>Launch Workspace</h2>
    <div id="profiles-container">
      <div class="empty-state">Loading...</div>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
